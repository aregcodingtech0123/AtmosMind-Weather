services:
  app:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    environment:
      - DATABASE_PATH=/app/data/cities.db
    # Bypass flaky Docker embedded DNS — required for Gemini + Open-Meteo from the container
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_opt:
      - ndots:0
      - timeout:3
      - attempts:3
      - use-vc
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:alpine
    env_file:
      - ./backend/.env
    command: sh -c 'redis-server --save 60 1 --loglevel warning --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
        REACT_APP_EMAILJS_PUBLIC_KEY: ${REACT_APP_EMAILJS_PUBLIC_KEY:-}
        REACT_APP_EMAILJS_SERVICE_ID: ${REACT_APP_EMAILJS_SERVICE_ID:-}
        REACT_APP_EMAILJS_TEMPLATE_ID: ${REACT_APP_EMAILJS_TEMPLATE_ID:-}
        REACT_APP_ADMIN_CONTACT_MAIL: ${REACT_APP_ADMIN_CONTACT_MAIL:-}
    environment:
      - NGINX_ENTRYPOINT_WORKER_PROCESSES_AUTOTUNE=0
    ports:
      - "3000:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  redis_data:
